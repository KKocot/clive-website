<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Clive">
  <!--
    Clive favicon
    - Background: dark rounded square (#111113) radius 6
    - Glyph "c" path-based (no external font dependency)
    - Indigo accent block (#5d6ae3) imitates terminal cursor in the c opening
  -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#111113"/>

  <!-- Stylized lowercase "c" — open ring on the right (8.5..23.5 horizontal) -->
  <!-- Constructed as a stroked arc using SVG path; stroke white, round caps -->
  <path
    d="M 22 11.5
       A 6.5 6.5 0 1 0 22 20.5"
    fill="none"
    stroke="#ffffff"
    stroke-width="3"
    stroke-linecap="round"
  />

  <!-- Terminal cursor block in the gap (right side of the c) — Clive primary indigo -->
  <rect x="21" y="13.5" width="4" height="5" rx="0.5" ry="0.5" fill="#5d6ae3"/>

  <!-- Subtle underscore accent bottom-left for "command line" feel -->
  <rect x="7" y="24" width="5" height="1.5" rx="0.5" ry="0.5" fill="#5d6ae3" opacity="0.85"/>
</svg>
