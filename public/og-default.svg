<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Clive — power-user wallet for Hive blockchain">
  <!--
    Clive default OG image (1200x630)
    - Dark background #111113
    - Indigo radial gradient (top-left)
    - Emerald subtle radial (bottom-left)
    - Left column: wordmark + tagline + Beta pill
    - Right column: stylized TUI mock (semi-transparent for depth)
    - Footer-left: domain
  -->
  <defs>
    <radialGradient id="indigoGlow" cx="0%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#5d6ae3" stop-opacity="0.30"/>
      <stop offset="60%" stop-color="#5d6ae3" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#5d6ae3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emeraldGlow" cx="10%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.65)"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#111113"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#indigoGlow)"/>
  <rect width="1200" height="630" fill="url(#emeraldGlow)"/>

  <!-- Subtle grid (very low opacity) -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0"  y1="105" x2="1200" y2="105"/>
    <line x1="0"  y1="210" x2="1200" y2="210"/>
    <line x1="0"  y1="315" x2="1200" y2="315"/>
    <line x1="0"  y1="420" x2="1200" y2="420"/>
    <line x1="0"  y1="525" x2="1200" y2="525"/>
    <line x1="200"  y1="0" x2="200"  y2="630"/>
    <line x1="400"  y1="0" x2="400"  y2="630"/>
    <line x1="600"  y1="0" x2="600"  y2="630"/>
    <line x1="800"  y1="0" x2="800"  y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- ============================================================
       LEFT COLUMN — wordmark, tagline, beta pill, domain
       ============================================================ -->

  <!-- Eyebrow: prompt prefix + version -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="20">
    <text x="80" y="160" fill="#71717a">// hive blockchain wallet  v0.1 beta</text>
  </g>

  <!-- Wordmark: "$ clive" — monospace, large, white with indigo prompt -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-weight="700">
    <text x="80" y="280" font-size="112" fill="#5d6ae3">$</text>
    <text x="160" y="280" font-size="112" fill="#ffffff">clive</text>
    <!-- Cursor block after wordmark -->
    <rect x="450" y="200" width="32" height="86" fill="#5d6ae3" opacity="0.9"/>
  </g>

  <!-- Tagline -->
  <g font-family="-apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif" font-weight="400">
    <text x="80" y="350" font-size="32" fill="#c0c0cc">Power-user wallet for Hive blockchain.</text>
    <text x="80" y="395" font-size="26" fill="#9d9da8">Encrypted keys. Mouse-driven TUI. Full blockchain ops.</text>
  </g>

  <!-- Beta pill: outline indigo + dot -->
  <g transform="translate(80, 440)">
    <rect x="0" y="0" width="98" height="34" rx="17" ry="17" fill="none" stroke="#5d6ae3" stroke-opacity="0.6" stroke-width="1.5"/>
    <circle cx="18" cy="17" r="4" fill="#5d6ae3"/>
    <text x="32" y="23" font-family="-apple-system, 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="600" fill="#5d6ae3" letter-spacing="0.5">BETA</text>
  </g>

  <!-- Domain footer -->
  <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="18">
    <text x="80" y="570" fill="#71717a">clive.openhive.network</text>
  </g>

  <!-- ============================================================
       RIGHT COLUMN — TUI mock (semi-transparent for depth)
       ============================================================ -->
  <g opacity="0.85">
    <!-- Terminal frame -->
    <rect x="700" y="140" width="440" height="350" rx="12" ry="12"
          fill="#18181b" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="700" y="140" width="440" height="34" rx="12" ry="12" fill="#1f1f23"/>
    <rect x="700" y="160" width="440" height="14" fill="#1f1f23"/>
    <line x1="700" y1="174" x2="1140" y2="174" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Decorative dots -->
    <circle cx="720" cy="157" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="738" cy="157" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="756" cy="157" r="5" fill="#10b981" opacity="0.6"/>

    <!-- Title text -->
    <text x="920" y="162" text-anchor="middle"
          font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace"
          font-size="13" fill="#71717a">clive — main view</text>

    <!-- TUI body content -->
    <g font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace" font-size="14">
      <text x="720" y="205" fill="#9d9da8">$ clive</text>
      <text x="720" y="230" fill="#71717a">> unlock profile</text>
      <text x="720" y="255" fill="#10b981">  ok  beekeeper unlocked</text>
      <text x="720" y="280" fill="#71717a">> account: alice</text>
      <text x="720" y="305" fill="#ffffff">  HIVE   1,284.501</text>
      <text x="720" y="325" fill="#ffffff">  HBD      512.330</text>
      <text x="720" y="345" fill="#ffffff">  HP    18,402.100</text>
      <text x="720" y="375" fill="#71717a">> operations</text>
      <text x="720" y="395" fill="#5d6ae3">  [t] transfer    [v] votes    [d] delegate</text>
      <text x="720" y="420" fill="#71717a">> rc  92%  ─────────────────░</text>
      <text x="720" y="450" fill="#9d9da8">$ <tspan fill="#ffffff">_</tspan></text>
    </g>

    <!-- Bottom card fade -->
    <rect x="700" y="380" width="440" height="110" rx="0" ry="0" fill="url(#cardFade)"/>
  </g>

  <!-- Bottom-right subtle indigo glow accent -->
  <g opacity="0.4">
    <circle cx="1100" cy="560" r="120" fill="#5d6ae3" opacity="0.15"/>
  </g>
</svg>
